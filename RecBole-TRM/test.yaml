# dataset config : Sequential Recommendation
USER_ID_FIELD: user_id
ITEM_ID_FIELD: item_id
TIME_FIELD: timestamp
load_col:
    inter: [user_id, item_id, rating, timestamp]
ITEM_LIST_LENGTH_FIELD: item_length
LIST_SUFFIX: _list
MAX_ITEM_LIST_LENGTH: 50
user_inter_num_interval: "[5,inf)"
item_inter_num_interval: "[5,inf)"
save_dataset: True             # (bool) Whether or not to save filtered dataset.
dataset_save_path: 'filtered_dataset'           # (str) The path of saved dataset.
# model config
#
#

# Training and evaluation config
epochs: 200
train_batch_size: 256
eval_batch_size: 256
eval_step: 10
stopping_step: 10
train_neg_sample_args: ~
eval_args:
    group_by: user
    order: TO
    split: {'LS': 'valid_and_test'}
    mode: full
metrics: ['Recall', 'MRR', 'NDCG', 'Hit', 'Precision']
topk: [5, 10, 20]                     
valid_metric: NDCG@10
metric_decimal_place: 4
neg_sampling: ~
# log_wandb: True                # (bool) Whether or not to log the experiment to wandb.
